action:
  max_speed: 3.0
  max_steer: 0.4189
  max_steer_rate: 0.0
  min_speed: 0.5
  smoothing_alpha: 0.3
  steer_dead_zone: 0.0
  type: continuous
algorithm:
  ppo:
    batch_size: 256
    clip_range: 0.2
    ent_coef: 0.001
    gae_lambda: 0.95
    gamma: 0.99
    learning_rate: 0.0003
    max_grad_norm: 0.5
    n_epochs: 10
    n_steps: 2048
    vf_coef: 0.5
  total_timesteps: 150000
  type: ppo
callbacks:
  checkpoint_freq: 50000
domain_randomization:
  action_delay:
    enabled: true
    max_steps: 3
  curriculum_full: 0.6
  curriculum_warmup: 0.2
  enabled: true
  friction:
    enabled: true
    range:
    - 0.7
    - 1.3
  lidar_dropout:
    enabled: true
    rate: 0.02
  lidar_noise:
    enabled: true
    std: 0.04
  mass:
    enabled: true
    range:
    - 3.2
    - 4.2
  mode: curriculum
env:
  integrator: rk4
  map_ext: .png
  map_path: maps/levine_slam/levine_slam
  max_steps: 3000
  num_agents: 1
  num_envs: 12
  num_laps: 1
  timestep: 0.01
evaluation:
  deterministic: true
  eval_freq: 25000
  n_eval_episodes: 20
experiment:
  device: cuda
  name: my_policy
  runs_dir: runs
  seed: 42
  wandb: true
  wandb_project: f1tenth_rl
expert:
  pure_pursuit:
    target_speed: 3.0
lidar:
  fov_deg: 270.0
  range_max: 30.0
  raw_beams: 1080
network:
  mlp:
    activation: relu
    hidden_sizes:
    - 128
    - 128
  pi_layers:
  - 64
  - 64
  type: mlp
  vf_layers:
  - 64
  - 64
observation:
  frame_stack: 1
  include_prev_action: true
  include_steering: false
  include_velocity: true
  include_yaw_rate: true
  lidar_beams: 108
  lidar_clip: 10.0
  lidar_normalize: true
  type: lidar_state
reward:
  collision_penalty: -10.0
  crosstrack_weight: 0.1
  heading_weight: 0.2
  lap_bonus: 10.0
  speed_weight: 0.0
  steering_change_penalty: 0.5
  survival_reward: 0.01
  type: cth
  wall_proximity_penalty: 0.5
  wall_proximity_threshold: 0.3
