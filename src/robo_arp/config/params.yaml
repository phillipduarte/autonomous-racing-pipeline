coordinator_node:
  ros__parameters:
    explore_wall_follow_speed: 1.5        # m/s, passed to wall follower during explore

slam_monitor_node:
  ros__parameters:
    stability_threshold_m2: 1.5         # max map area delta (m²) to count as stable
    stable_frames_required: 1           # consecutive stable frames before convergence
    min_map_area_m2: 2.0                  # map must be at least this large (sanity check)
    map_save_path: "/tmp/robo_arp_map"    # written as /tmp/robo_arp_map.pgm + .yaml

safety_monitor_node:
  ros__parameters:
    cross_track_error_threshold: 0.4      # meters; triggers emergency if exceeded
    check_rate_hz: 20.0

map_processor_node:
  ros__parameters:
    centerline_script_path: ""            # MUST be set at launch — overridden in launch file

pure_pursuit_node:
  ros__parameters:
    raceline_path: ""                     # set dynamically via coordinator/current_raceline
    lookahead_distance: 0.8               # meters — tune on hardware
    speed: 1.5                            # m/s — conservative for first centerline test
    wheelbase: 0.33                       # F1TENTH wheelbase in meters
